name: Deploy MayWin Backend

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'Dockerfile.lambda-http'
      - '.github/workflows/deploy.yml'
      - 'package.json'
      - 'tsconfig.json'

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: maywin-nest-lambda
  LAMBDA_FUNCTION: maywin-core-api

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: maywin_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Security audit (A.8.8)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: false
      - name: Run tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: password
          DB_NAME: maywin_test
          DB_SCHEMA: public
          JWT_SECRET: test-secret
          JWT_EXPIRES_IN: 3600
          AUTH_DISABLE_OTP: 'true'

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::556088722017:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHub-Actions-MayWin-Deploy

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker buildx build \
            -f Dockerfile.lambda-http \
            --platform linux/amd64 \
            --provenance=false \
            --sbom=false \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }} \
            -t ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:http-latest \
            --push .

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --region ${{ env.AWS_REGION }} \
            --image-uri ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:http-latest

      - name: Wait for Lambda update
        run: |
          echo "Waiting for Lambda update..."
          sleep 10

      - name: Check Lambda deployment status
        run: |
          aws lambda get-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --region ${{ env.AWS_REGION }} \
            --query "{State:State,LastUpdateStatus:LastUpdateStatus}" \
            --output table

      - name: Verify Lambda function
        run: |
          STATUS=$(aws lambda get-function-configuration \
            --function-name ${{ env.LAMBDA_FUNCTION }} \
            --region ${{ env.AWS_REGION }} \
            --query 'LastUpdateStatus' \
            --output text)
          
          if [ "$STATUS" != "Successful" ]; then
            echo "Lambda update failed or still in progress"
            exit 1
          fi
          echo "Lambda update successful!"
